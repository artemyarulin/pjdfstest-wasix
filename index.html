<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>pjdfstest Report</title>
  <style>
    body {
      color: #1f2937;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 32px;
    }

    .summary {
      display: flex;
      gap: 12px;
      margin: 16px 0 24px;
    }

    .card {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px 16px;
      min-width: 100px;
    }

    .card strong {
      display: block;
      font-size: 22px;
    }

    details {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      margin: 10px 0;
      padding: 10px 12px;
    }

    summary {
      cursor: pointer;
      font-weight: 700;
    }

    .test {
      margin: 12px 0 12px 16px;
    }

    .case {
      border-left: 3px solid #e5e7eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      margin: 4px 0;
      padding: 4px 8px;
      white-space: pre-wrap;
    }

    .failed {
      border-left-color: #dc2626;
      color: #991b1b;
    }

    .passed {
      border-left-color: #16a34a;
      color: #166534;
    }

    .muted {
      color: #6b7280;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>pjdfstest Report</h1>
  <div id="app">Loading report.json...</div>

  <script>
    fetch("report.json")
      .then((response) => {
        if (!response.ok) throw new Error(`failed to load report.json: ${response.status}`);
        return response.json();
      })
      .then(render)
      .catch((error) => {
        document.getElementById("app").textContent = error.message;
      });

    function render(report) {
      const app = document.getElementById("app");
      app.innerHTML = "";

      app.appendChild(summary(report.summary));

      for (const group of report.groups) {
        const details = document.createElement("details");
        details.open = group.summary.failed > 0;

        const title = document.createElement("summary");
        title.textContent = `${group.name}: ${group.summary.passed}/${group.summary.cases} passed, ${group.summary.failed} failed`;
        details.appendChild(title);

        for (const test of group.tests) {
          const testEl = document.createElement("div");
          testEl.className = "test";

          const heading = document.createElement("div");
          heading.innerHTML = `<strong>${escapeHtml(test.path)}</strong> <span class="muted">${test.summary.passed}/${test.summary.cases} passed, planned ${test.planned ?? 0}</span>`;
          testEl.appendChild(heading);

          for (const line of test.output) {
            const output = document.createElement("div");
            output.className = "case";
            output.textContent = line;
            testEl.appendChild(output);
          }

          for (const item of test.cases) {
            const row = document.createElement("div");
            row.className = `case ${item.status === "failed" ? "failed" : "passed"}`;
            row.textContent = item.raw;
            testEl.appendChild(row);
          }

          details.appendChild(testEl);
        }

        app.appendChild(details);
      }
    }

    function summary(summary) {
      const wrap = document.createElement("div");
      wrap.className = "summary";
      for (const [label, value] of [
        ["Tests", summary.tests],
        ["Cases", summary.cases],
        ["Passed", summary.passed],
        ["Failed", summary.failed],
        ["Planned", summary.planned],
      ]) {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `<strong>${value}</strong><span>${label}</span>`;
        wrap.appendChild(card);
      }
      return wrap;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;",
      }[ch]));
    }
  </script>
</body>
</html>
