<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>pjdfstest</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 32px; color: #172033; }
    button { padding: 8px 12px; margin-right: 8px; }
    header { align-items: center; display: flex; gap: 16px; justify-content: space-between; }
    h1 { margin: 0; }
    #error { background: #fee2e2; border: 1px solid #fca5a5; border-radius: 8px; color: #991b1b; display: none; padding: 8px 12px; }
    table { border-collapse: collapse; margin-top: 16px; width: 100%; }
    th, td { border-bottom: 1px solid #ddd; padding: 8px; text-align: left; }
    .test-desc { color: #64748b; font-size: 0.9em; margin-top: 3px; }
    .status { border-radius: 999px; display: inline-block; font-size: 0.8em; font-weight: 700; padding: 3px 8px; }
    .status-passed { background: #dcfce7; color: #166534; }
    .status-skip, .status-ignored { background: #fef3c7; color: #92400e; }
    .status-failed { background: #fee2e2; color: #991b1b; }
    pre { background: #f6f8fa; padding: 12px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <header>
    <h1>pjdfstest</h1>
    <div id="error"></div>
  </header>
  <button id="run">Run test</button>
  <span id="status">Idle</span>
  <table>
    <thead><tr><th>Group</th><th>Name</th><th>Result</th><th>Details</th></tr></thead>
    <tbody id="results"></tbody>
  </table>
  <pre id="log"></pre>
  <script>
    async function loadReport() {
      const report = await fetch('/report').then(r => r.json());
      renderReport(report);
    }

    function renderReport(report) {
      const rows = (report.results || []).map(([test, result]) => {
        const status = result.passed || 'Skip';
        const statusClass = `status-${status.toLowerCase()}`;
        return `
        <tr>
          <td>${escapeHtml(test.group)}</td>
          <td>
            <div>${escapeHtml(test.name)}.t</div>
            <div class="test-desc">${escapeHtml(test.desc)}</div>
          </td>
          <td><span class="status ${statusClass}">${escapeHtml(status)}</span></td>
          <td>${escapeHtml(result.error || '')}</td>
        </tr>
      `}).join('');
      document.getElementById('results').innerHTML = rows || '<tr><td colspan="4">No test results yet</td></tr>';
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;',
      }[ch]));
    }

    function formatRunError(error) {
      if (!error) return '';
      if (typeof error === 'string') return error;
      const kind = error.kind || 'RunError';
      const detail = error.message || error.path || '';
      return detail ? `${kind}: ${detail}` : kind;
    }

    document.getElementById('run').onclick = () => {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws`);
      const log = document.getElementById('log');
      const error = document.getElementById('error');
      error.style.display = 'none';
      error.textContent = '';
      ws.onopen = () => {
        document.getElementById('status').textContent = 'Running';
        ws.send(JSON.stringify({ type: 'run-test' }));
      };
      ws.onmessage = (event) => {
        log.textContent += event.data + '\n';
        try {
          const msg = JSON.parse(event.data);
          if (msg.type === 'RunError') {
            error.textContent = formatRunError(msg.error);
            error.style.display = 'block';
            document.getElementById('status').textContent = 'error';
          }
          if (msg.type === 'RunReport' || msg.type === 'RunError') {
            document.getElementById('status').textContent = msg.type;
            if (msg.type === 'RunReport') {
              renderReport(msg.report);
            }
          }
        } catch (_) {}
      };
      ws.onclose = () => document.getElementById('status').textContent = 'Closed';
    };

    loadReport();
  </script>
</body>
</html>
